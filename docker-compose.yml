services:

  postgres:
    image: postgres:16

    container_name: event_processor_db

    restart: always

    environment:
      POSTGRES_DB: event_processor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: